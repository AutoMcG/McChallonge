server {
    listen 80;
    server_name _;

    # Allow larger payloads for future API actions.
    client_max_body_size 10m;

    # Restrict cache-mutating endpoints to loopback only.
    # Admin controls are only reachable via http://localhost or http://127.0.0.1 — not the hostname.
    location ~ ^/api/cache/(update|clear)$ {
        allow 127.0.0.0/8;
        allow ::1;
        deny  all;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
