<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <style>
        body {
            background: #f8fafc;
        }
        .underway-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 12px;
        }
        .banner-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #ffffff;
            padding: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.05);
        }
        .banner-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            display: block;
        }
        .meta {
            color: #475569;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="underway-wrap">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h1 class="h3 mb-0">Underway Matches</h1>
        <a href="{{ url_for('tournament_page') }}" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
    </div>

    <p id="underway-generated-at" class="meta mb-3" {% if not generated_at %}style="display:none;"{% endif %}>
        Last generated: {{ generated_at }}
    </p>

    <div id="underway-banners">
    {% if banners and banners|length > 0 %}
        {% for banner in banners %}
        <div class="banner-card">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                <strong>{{ banner.title }}</strong>
                <span class="meta">{{ banner.tournament_name }}</span>
            </div>
            <img src="{{ banner.url }}" alt="{{ banner.title }}">
        </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-info">No underway matches right now.</div>
    {% endif %}
    </div>
</div>
<script>
    (function () {
        const REFRESH_MS = 5000;
        const bannersContainer = document.getElementById('underway-banners');
        const generatedAt = document.getElementById('underway-generated-at');

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value ?? '';
            return div.innerHTML;
        }

        function renderBanners(payload) {
            const banners = Array.isArray(payload?.banners) ? payload.banners : [];
            if (payload?.generated_at) {
                generatedAt.style.display = '';
                generatedAt.textContent = `Last generated: ${payload.generated_at}`;
            } else {
                generatedAt.style.display = 'none';
            }

            if (!banners.length) {
                bannersContainer.innerHTML = '<div class="alert alert-info">No underway matches right now.</div>';
                return;
            }

            bannersContainer.innerHTML = banners.map((banner) => {
                const title = escapeHtml(banner.title || 'Match');
                const tournament = escapeHtml(banner.tournament_name || 'Tournament');
                const url = escapeHtml(banner.url || '');
                return `
                    <div class="banner-card">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                            <strong>${title}</strong>
                            <span class="meta">${tournament}</span>
                        </div>
                        <img src="${url}" alt="${title}">
                    </div>
                `;
            }).join('');
        }

        async function refreshUnderway() {
            try {
                const response = await fetch('/api/underway', { cache: 'no-store' });
                if (!response.ok) return;
                const payload = await response.json();
                renderBanners(payload);
            } catch (error) {
                console.warn('Failed to refresh underway view:', error);
            }
        }

        window.setInterval(refreshUnderway, REFRESH_MS);
    })();
</script>
</body>
</html>
