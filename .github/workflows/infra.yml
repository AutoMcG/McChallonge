name: Terraform Infra

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra.yml"
  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/envs/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_site_bucket_name: ${{ vars.MCCHALLONGE_SITE_BUCKET }}
          TF_VAR_tournament_ids: ${{ vars.MCCHALLONGE_TOURNAMENT_IDS }}
          TF_VAR_challonge_user: ${{ secrets.CHALLONGE_USER }}
          TF_VAR_challonge_key: ${{ secrets.CHALLONGE_KEY }}

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform/envs/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_site_bucket_name: ${{ vars.MCCHALLONGE_SITE_BUCKET }}
          TF_VAR_tournament_ids: ${{ vars.MCCHALLONGE_TOURNAMENT_IDS }}
          TF_VAR_challonge_user: ${{ secrets.CHALLONGE_USER }}
          TF_VAR_challonge_key: ${{ secrets.CHALLONGE_KEY }}
