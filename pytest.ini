[pytest]
testpaths = mcchallonge/tests
python_files = test_*.py
python_classes = Test* UnitTest* IntegrationTest*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    -m "not integration"
log_cli = true
log_cli_level = INFO
markers =
    integration: marks tests that require live Challonge credentials (deselected by default)
